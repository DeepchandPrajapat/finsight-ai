<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100 min-h-screen">

  <nav class="bg-white shadow-md mb-8">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
        <!-- logo/brand -->
        <span class="text-xl font-bold text-gray-800">💰 Expense Tracker</span>

        <!-- links -->
        <div class="space-x-6">
            <a href="index.html" class="text-gray-600 hover:text-blue-700 font-medium transition">Dashboard</a>
            <a href="expenses.html" class="text-gray-600 hover:text-blue-700 font-medium transition">All Expenses</a>
            <a href="add-expense.html" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition">Add Expense</a>
        </div>
    </div>
</nav>

 
  <form id="expense-form" class="bg-white p-6 rounded-xl shadow-md max-w-xl mx-auto mb-8">
    <input type="number" id="amount" placeholder="Amount" required class="w-full border border-gray-300 rounded-lg p-2 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400" />
    <input type="text" id="category" placeholder="Category" required class="w-full border border-gray-300 rounded-lg p-2 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400" />
    <input type="text" id="description" placeholder="Description" class="w-full border border-gray-300 rounded-lg p-2 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400" />
    <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition duration-200">Add Expense</button>
  </form>

  <ul id="expense-list"></ul>

  <script src="../script/script.js"></script>
</body>
</html>

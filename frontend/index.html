<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<nav class="bg-white shadow-md mb-8">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
        <!-- logo/brand -->
        <span class="text-xl font-bold text-gray-800">💰 Expense Tracker</span>

        <!-- links -->
        <div class="space-x-6">
            <a href="index.html" class="text-blue-500 hover:text-purple-600 font-medium transition">Dashboard</a>
            <a href="expenses.html" class="text-gray-600 hover:text-purple-600 font-medium transition">All Expenses</a>
            <a href="add-expense.html" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600 transition">Add Expense</a>
        </div>
    </div>
</nav>

<!-- main content wrapper -->
<div class="max-w-6xl mx-auto px-4">

    <!-- summary cards -->
    <div class="grid grid-cols-2 gap-6 mb-8">
        <!-- card 1 -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <p class="text-gray-500 text-sm mb-2">Total Spending</p>
            <p id="total-spending" class="text-3xl font-bold text-gray-800">₹0</p>
        </div>

        <!-- card 2 -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <p class="text-gray-500 text-sm mb-2">This Month</p>
            <p id="month-spending" class="text-3xl font-bold text-gray-800">₹0</p>
        </div>
    </div>

    <!-- block 2 - pie chart and ai insights -->
    <div class="grid grid-cols-2 gap-6 mb-8">

        <!-- left - pie chart -->
        <div  class="bg-white p-6 rounded-xl shadow-md flex-1">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Spending by Category</h2>
            <canvas id="pie-chart"></canvas>
        </div>

        <!-- right - ai insights -->
        <div class="bg-white p-6 rounded-xl shadow-md flex-1">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-gray-700">AI Insights</h2>
                <button onclick="fetchInsights()" class="bg-purple-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-purple-600 transition">Refresh</button>
            </div>
            <div id="insights-box" class="text-gray-600 text-sm whitespace-pre-line">Loading insights...</div>
        </div>

    </div>

    <!-- block 3 - recent expenses -->
    <div class="bg-white p-6 rounded-xl shadow-md mb-8">
    <h2 class="text-lg font-semibold text-gray-700 mb-4">Recent Expenses</h2>
    
    <!-- table -->
    <table class="w-full text-sm text-gray-600">
        <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
            <tr>
                <th class="px-4 py-3 text-left" >Category</th>
                <th class="px-4 py-3 text-left">Description</th>
                <th class="px-4 py-3 text-left">Amount</th>
                <th class="px-4 py-3 text-left">Date</th>
            </tr>
        </thead>
        <tbody id="recent-expenses">
            <!-- filled by JS -->
        </tbody>
    </table>
</div>

</div>

<script src="../script/dashboard.js"></script>
</body>
</html>
